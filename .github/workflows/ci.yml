name: CI

on:
  push:
    branches: ["main", "agents/**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      # Pinned to full-length commit SHAs (SEC-008 supply-chain + repo policy
      # "Require actions to be pinned to a full-length commit SHA").
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        # RLS integration tests skip automatically without Supabase env.
        run: npm test
